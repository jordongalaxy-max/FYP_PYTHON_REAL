[general]
output = "/exp/icarus/data/users/jkoh1/test"
pidfn = "default_pid"
primfn = "default_primary_classification"
fsthresh = [
    "@photon_threshold",
    "@electron_threshold",
    "@muon_threshold",
    "@pion_threshold",
    "@proton_threshold",
]

[parameters]
photon_threshold = 25.0
electron_threshold = 25.0
muon_threshold = 143.425
pion_threshold = 25.0
proton_threshold = 50.0


[[sample]]
name = "icarus_NuMI"
path = "/pnfs/icarus/persistent/users/dcarber/spine/combined_files/NuMI_CV_flat_cafs_2/NuMI_CV_flat_cafs_2_00.root"
ismc = true
disable = false


#PID
[[tree]]
name = "1muon1proton_efficiency"
sim_only = true
mode = "true"
cut = [
    { name = "neutrino", type = "true"},
    { name = "containment_cut", type = "true_particle"},
    { name = "fiducial_cut", type = "true"},
    { name = "no_photons", type = "true", parameters = [ "@photon_threshold"   ] },
    { name = "no_electrons", type = "true", parameters = [ "@electron_threshold" ] },
    { name = "no_charged_pions", type = "true", parameters = [ "@pion_threshold"     ] },
    { name = "single_muon", type = "true", parameters = [ "@muon_threshold"     ] },
    { name = "single_proton", type = "true", parameters = [ "@proton_threshold"   ] },
]
branch = [
    {name = "ke", type = "both_particle"},
    {name = "csda_ke", type = "reco_particle"},
    {name = "mcs_ke", type = "reco_particle"},
    {name = "calo_ke", type = "reco_particle"},
    {name = "primary_classification", type = "both_particle"},
    {name = "pid", type = "both_particle"},
    {name = "start_x", type = "both_particle"},
    {name = "start_y", type = "both_particle"},
    {name = "start_z", type = "both_particle"},
    {name = "start_dir_x", type = "both_particle"},
    {name = "start_dir_y", type = "both_particle"},
    {name = "start_dir_z", type = "both_particle"},
    {name = "end_x", type = "both_particle"},
    {name = "end_y", type = "both_particle"},
    {name = "end_z", type = "both_particle"},
    {name = "end_dir_x", type = "both_particle"},
    {name = "end_dir_y", type = "both_particle"},
    {name = "end_dir_z", type = "both_particle"},
    {name = "polar_angle", type = "both_particle"},
    {name = "azimuthal_angle", type = "both_particle"},
    {name = "semantic_type", type = "both_particle"},
    {name = "iou", type = "both_particle"},
    {name = "primary_softmax", type = "reco_particle"},
    {name = "secondary_softmax", type = "reco_particle"},
    {name = "photon_softmax", type = "reco_particle"},
    {name = "electron_softmax", type = "reco_particle"},
    {name = "muon_softmax", type = "reco_particle"},
    {name = "pion_softmax", type = "reco_particle"},
    {name = "proton_softmax", type = "reco_particle"},
    {name = "theta_xw_horizontal", type = "both_particle"},
    {name = "theta_xw_p60", type = "both_particle"},
    {name = "theta_xw_m60", type = "both_particle"},
    {name = "theta_xw_vertical", type = "both_particle"},
    {name = "theta_xw_p30", type = "both_particle"},
    {name = "theta_xw_m30", type = "both_particle"},
]

