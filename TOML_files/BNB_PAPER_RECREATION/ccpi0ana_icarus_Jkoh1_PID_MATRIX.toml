[general]
output = "/exp/icarus/data/users/jkoh1/ccpi0ana_icarus_Jkoh1_PID_MATRIX"
primfn = "default_primary_classification"
pidfn = "default_pid"

fsthresh = [
    "@photon_threshold",
    "@electron_threshold",
    "@muon_threshold",
    "@pion_threshold",
    "@proton_threshold",
]

recopi0thresh = [
    "@photon_threshold",
    "@leading_photon_threshold",
]

[parameters]
photon_threshold = 25.0
electron_threshold = 0.0
muon_threshold = 143.425
pi0_threshold = 0.0
pion_threshold = 25.0
proton_threshold = 0.0
leading_photon_threshold = 25.0
pi0_mass_veto_low = 60.0
pi0_mass_veto_high = 300.0
flash_low_t = -0.5
flash_high_t = 1.6
bnb_fom2_cut = 0.98

[[sample]]
name = "BNB_SIMULATION"
path = "/pnfs/icarus/persistent/users/mueller/production/simulation/nominal/input*.flat.root"
ismc = true
disable = false


[[tree]]
name = "selected_nu_neutrinocut"
sim_only = false
add_exposure = true
mode = "reco"
cut = [
    {name = "fiducial_cut", type = "reco"},
    {name = "avoid_mystery_zgap", type = "reco"},
    {name = "flash_cut", type = "reco",  parameters = ["@flash_low_t", "@flash_high_t"]},
    {name = "single_muon", type = "reco", parameters = ["@muon_threshold"]},
    {name = "no_charged_pions", type = "reco", parameters = ["@pion_threshold"]},
    {name = "two_photons", type = "reco", parameters = ["@photon_threshold"]},
    {name = "valid_pi0_mass_cut", type = "reco", parameters = ["@pi0_mass_veto_low", "@pi0_mass_veto_high"]},
    {name = "neutrino", type = "true"}
]
branch = [
    {name = "primary_classification", type = "both_particle"},
    {name = "pid", type = "both_particle"},
    {name = "semantic_type", type = "both_particle"},
    {name = "iou", type = "both_particle"},
    {name = "primary_softmax", type = "reco_particle"},
    {name = "secondary_softmax", type = "reco_particle"},
    {name = "photon_softmax", type = "reco_particle"},
    {name = "electron_softmax", type = "reco_particle"},
    {name = "muon_softmax", type = "reco_particle"},
    {name = "pion_softmax", type = "reco_particle"},
    {name = "proton_softmax", type = "reco_particle"},
    {name = "ke", type = "both_particle"},
    {name = "energy", type = "both_particle"},
    {name = "length", type = "both_particle"},
    {name = "csda_ke", type = "reco_particle"},
    {name = "mcs_ke", type = "reco_particle"},
    {name = "calo_ke", type = "reco_particle"},
]

