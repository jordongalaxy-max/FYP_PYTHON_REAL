[general]
output = "/exp/icarus/data/users/jkoh1/2_shower_event_preselection_and_selection_Truth_v2"
primfn = "default_primary_classification"
pidfn = "default_pid"
fsthresh = [
    "@photon_threshold",
    "@electron_threshold",
    "@muon_threshold",
    "@pion_threshold",
    "@proton_threshold",
]

[parameters]
photon_threshold = 25.0
electron_threshold = 25.0
muon_threshold = 143.425
pion_threshold = 25.0
proton_threshold = 50.0

[[category]] # 0 : Neutrino, charged current
cuts = [
    { name = "neutrino" },
    { name = "iscc"     },
]

[[category]] # 1 : Neutrino, neutral current
cuts = [
    { name = "neutrino" },
    { name = "!iscc"    },
]

[[category]] # 2 : Cosmic
cuts = [
    { name = "!neutrino" },
]

#NuMI Samples

[[sample]]
name = "NuMI_simulation_0"
path = "/exp/icarus/data/users/jkoh1/NuMI_CV_flat_cafs_2_00.root"
ismc = true
disable = false

#BNB samples

[[sample]]
name = "BNB_simulation_0"
path = "/pnfs/icarus/persistent/users/mueller/production/simulation/nominal/input000.flat.root"
ismc = true
disable = false

#Pre-selection efficiency analysis

[[tree]] # true no cuts
name = "shower_true_nocut"
sim_only = false
mode = "true"
cut = [
    { name = "no_cut",          type = "true" },
]
branch = [
    #Multiplicity tests and interaction level
    {name = "fiducial_cut",          type = "both"    },
    {name = "containment_cut",       type = "both"    },
    {name = "valid_flashmatch",      type = "both"    },
    {name = "neutrino",              type = "true"    },
]

[[tree]] # reco no cuts  
name = "shower_reco_nocut"
sim_only = false
mode = "reco"
cut = [
    { name = "no_cut",          type = "reco" },
]
branch = [
    #Multiplicity tests and interaction level
    {name = "fiducial_cut",          type = "both"    },
    {name = "containment_cut",       type = "both"    },
    {name = "valid_flashmatch",      type = "both"    },
]

#pre-selection cuts---------------------------------------------------------------------------------------

[[tree]] # true preselection
name = "shower_true_preselection"
sim_only = false
mode = "true"
cut = [
    { name = "fiducial_cut",          type = "true" },
    { name = "containment_cut",       type = "true" },
    { name = "neutrino",              type = "true" },]
branch = [
    #Multiplicity tests and interaction level
    {name = "photon_multiplicity",   type = "both", parameters = [ "@photon_threshold"   ]},
    {name = "electron_multiplicity", type = "both", parameters = [ "@electron_threshold" ]},
    {name = "muon_multiplicity",     type = "both", parameters = [ "@muon_threshold"     ]},
    {name = "pion_multiplicity",     type = "both", parameters = [ "@pion_threshold"     ]},
    {name = "proton_multiplicity",   type = "both", parameters = [ "@proton_threshold"   ]},
    {name = "fiducial_cut",          type = "both"    },
    {name = "containment_cut",       type = "both"    },
    {name = "valid_flashmatch",      type = "both"    },
]

#interaction level variables------------------------------------------------------------------------------

