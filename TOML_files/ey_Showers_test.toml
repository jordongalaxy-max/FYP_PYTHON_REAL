[general]
output = "/exp/icarus/data/users/jkoh1/BNB_NuMI_1u1p_and_seperate_particles"
primfn = "default_primary_classification"
pidfn = "default_pid"
fsthresh = [
    "@photon_threshold",
    "@electron_threshold",
    "@muon_threshold",
    "@pion_threshold",
    "@proton_threshold",
]

[parameters]
photon_threshold = 25.0
electron_threshold = 25.0
muon_threshold = 143.425
pion_threshold = 25.0
proton_threshold = 50.0

[[category]] # 0 : Neutrino, charged current
cuts = [
    { name = "neutrino" },
    { name = "iscc"     },
]

[[category]] # 1 : Neutrino, neutral current
cuts = [
    { name = "neutrino" },
    { name = "!iscc"    },
]

[[category]] # 2 : Cosmic
cuts = [
    { name = "!neutrino" },
]

#NuMI Samples

[[sample]]
name = "NuMI_simulation_0"
path = "/exp/icarus/data/users/jkoh1/NuMI_CV_flat_cafs_2_00.root"
ismc = true
disable = false

[[tree]] # ey reco
name = "ee_shower_selected"
sim_only = false
mode = "reco"
cut = [
    { name = "fiducial_cut",     type = "reco" },
    { name = "containment_cut",  type = "reco" },
    { name = "valid_flashmatch", type = "reco" },
    { name = "no_charged_pions",      type = "reco", parameters = [ "@pion_threshold"     ] },
    { name = "no_muons",              type = "reco", parameters = [ "@muon_threshold"     ] },
    { name = "no_protons",            type = "reco", parameters = [ "@pion_threshold"     ] },
    { name = "single_electron",       type = "reco", parameters = [ "@electron_threshold" ] },
    { name = "single_photon",         type = "reco", parameters = [ "@photon_threshold"   ] },
]
branch = [
    #Multiplicity tests and interaction level
    {name = "photon_multiplicity",   type = "both", parameters = [ "@photon_threshold"   ]},
    {name = "electron_multiplicity", type = "both", parameters = [ "@electron_threshold" ]},
    {name = "muon_multiplicity",     type = "both", parameters = [ "@muon_threshold"     ]},
    {name = "pion_multiplicity",     type = "both", parameters = [ "@pion_threshold"     ]},
    {name = "proton_multiplicity",   type = "both", parameters = [ "@proton_threshold"   ]}
    {name = "vertex_x",              type = "both"    },
    {name = "vertex_y",              type = "both"    },
    {name = "vertex_z",              type = "both"    },
    #leading particle 
    {name = "ke",                    type = "both_particle", selector = "leading_primary_gOre" },
    {name = "csda_ke",               type = "reco_particle", selector = "leading_primary_gOre" },
    {name = "mcs_ke",                type = "reco_particle", selector = "leading_primary_gOre" },
    {name = "calo_ke",               type = "reco_particle", selector = "leading_primary_gOre" },
    {name = "primary_classification",type = "both_particle", selector = "leading_primary_gOre" },
    {name = "pid",                   type = "both_particle", selector = "leading_primary_gOre" },
